<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extreme - Panel de Control</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { padding: 20px; }
        .table-bg { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 2px solid #0055ff; padding: 10px; color: #0055ff; }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-tg { background: #0088cc; color: white; }
        .btn-pay { background: #ffaa00; color: black; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">EXTREME GYM - PAGOS</h1>
        <div class="table-bg">
            <table>
                <thead>
                    <tr>
                        <th>ALUMNO</th>
                        <th>ESTADO DE PAGO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyCfdMxnDiNliSsM_zmMJWfg7xAPCpw8xNg",
            authDomain: "pagos-extreme.firebaseapp.com",
            projectId: "pagos-extreme",
            databaseURL: "https://pagos-extreme-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);

        onValue(ref(db, 'alumnos'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('lista');
            list.innerHTML = "";
            for (let id in data) {
                const u = data[id];
                list.innerHTML += `
                    <tr>
                        <td>${u.nombre}</td>
                        <td>${u.vencimiento || 'Pendiente'}</td>
                        <td>
                            <button class="btn btn-tg" onclick="window.open('https://t.me/${u.telegramID}')">AVISAR TG</button>
                            <button class="btn btn-pay" onclick="renovar('${id}', 30)">+30 DÍAS</button>
                            <button class="btn btn-pay" onclick="renovar('${id}', 15)">+15 DÍAS</button>
                        </td>
                    </tr>`;
            }
        });

        window.renovar = (id, dias) => {
            let fecha = new Date();
            fecha.setDate(fecha.getDate() + dias);
            update(ref(db, 'alumnos/' + id), { vencimiento: fecha.toISOString().split('T')[0] });
        };
    </script>
</body>
</html>
